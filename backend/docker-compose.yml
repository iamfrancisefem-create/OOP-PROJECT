version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Database Service (PostgreSQL 16)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: project_management
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Caching Service (Redis 7)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ---------------------------------------------------------------------------
  # Spring Boot Application Service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pms-backend-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/project_management
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1wcm9qZWN0LW1hbmFnZW1lbnQtc3lzdGVt}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5500}
      - SPRING_PROFILES_ACTIVE=prod
      - FILE_UPLOAD_DIR=/app/uploads
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
