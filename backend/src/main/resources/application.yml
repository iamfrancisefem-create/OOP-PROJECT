# =============================================================================
# Project Management System — Default Configuration
# =============================================================================

spring:
  application:
    name: project-management-system

  # ---------------------------------------------------------------------------
  # PostgreSQL Datasource
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/project_management
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:xxx3@$}
    driver-class-name: org.postgresql.Driver

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ---------------------------------------------------------------------------
  # Flyway Database Migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ---------------------------------------------------------------------------
  # File Upload Limits
  # ---------------------------------------------------------------------------
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ---------------------------------------------------------------------------
  # Mail (SMTP) — used for notifications and password resets
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# =============================================================================
# Server
# =============================================================================
server:
  port: 8080

# =============================================================================
# JWT Configuration
# =============================================================================
jwt:
  # IMPORTANT: Override JWT_SECRET in production with a strong, unique Base64-encoded value.
  # Default below is for development only and MUST be changed in production.
  secret: ${JWT_SECRET:ZGV2LW9ubHktam10LXNlY3JldC1kby1ub3QtdXNlLWluLXByb2Q=}
  access-token-expiration: 900000        # 15 minutes in milliseconds
  refresh-token-expiration: 604800000    # 7 days in milliseconds
  reset-token-expiration: 1800000       # 30 minutes in milliseconds

# =============================================================================
# File Storage
# =============================================================================
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  allowed-types: pdf,docx,jpg,jpeg,png,zip,xlsx

# =============================================================================
# CORS
# =============================================================================
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,https://*.vercel.app}

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    com.pms: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
