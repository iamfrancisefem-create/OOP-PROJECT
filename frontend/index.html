<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Management System</title>
  <meta name="description" content="A premium project management SaaS built with a sleek UI and real‑time collaboration." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script type="module" src="assets/js/auth.js"></script>
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar (hidden on landing) -->
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <nav class="navbar">
        <div class="navbar-left">
          <button class="btn-menu-toggle"><i class="fa-solid fa-bars"></i></button>
          <div class="page-title">Welcome</div>
        </div>
        <div class="navbar-right">
          <button class="btn-icon theme-toggle" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
        </div>
      </nav>
      <section class="page-body">
        <div class="auth-page">
          <div class="auth-card">
            <div class="auth-card-header">
              <h2>Project Management System</h2>
              <p>Organize, collaborate, and deliver with confidence.</p>
            </div>
            <div class="auth-card-body">
              <button class="btn btn-primary btn-full" id="btnLogin">
                <i class="fa-solid fa-right-to-bracket"></i> Log In
              </button>
              <button class="btn btn-outline btn-full" id="btnRegister">
                <i class="fa-solid fa-user-plus"></i> Register
              </button>
            </div>
            <div class="auth-footer">
              <a href="#" id="btnDemo">Try demo account</a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script>
    // Quick navigation from landing
    document.getElementById('btnLogin').addEventListener('click', () => location.href = 'pages/login.html');
    document.getElementById('btnRegister').addEventListener('click', () => location.href = 'pages/register.html');
    // Demo button loads a pre‑seeded account (email: demo@pms.com, password: demo123)
    document.getElementById('btnDemo').addEventListener('click', e => {
      e.preventDefault();
      // Store demo credentials in session and redirect to dashboard
      import('./js/auth.js').then(({ loginDemo }) => loginDemo());
    });
  </script>
</body>
</html>
