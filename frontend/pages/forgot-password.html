<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ProjectFlow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/forms.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-logo">
        <div class="logo-box">P</div>
        <div class="brand-name">Project<span>Flow</span></div>
      </div>
      <div class="auth-brand-content">
        <h1>Reset Your<br>Password</h1>
        <p>We'll send you a link to reset your password.</p>
      </div>
      <div class="auth-brand-bottom">&copy; 2026 ProjectFlow</div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-card">
        <div class="auth-form-header">
          <button class="back-link" onclick="window.location.href='login.html'"><i class="fa-solid fa-arrow-left"></i> Back to login</button>
          <h2>Forgot Password?</h2>
          <p>Enter your email and we'll send you a reset link.</p>
        </div>
        <div class="alert-banner" id="fpAlert"></div>
        <form id="fpForm" novalidate>
          <div class="form-group mb-4">
            <label class="form-label">Email Address <span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input class="form-input" type="email" id="fpEmail" placeholder="you@company.com" required>
            </div>
            <small class="form-error" id="fpEmailErr"></small>
          </div>
          <button class="btn btn-primary btn-full btn-lg btn-submit" type="submit" id="fpBtn">
            <span class="btn-text">Send Reset Link</span>
            <span class="btn-spinner"><span class="spinner"></span></span>
          </button>
        </form>
        <div class="auth-footer">
          Remember your password? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { AuthAPI } from '../assets/js/api.js';
    import { toast, validateForm, setLoading, showAlert, hideAlert } from '../assets/js/utils.js';

    document.getElementById('fpForm').addEventListener('submit', async e => {
      e.preventDefault();
      hideAlert(document.getElementById('fpAlert'));
      if (!validateForm({ '#fpEmail': { required: true, email: true } })) return;
      setLoading(document.getElementById('fpBtn'), true);
      try {
        await AuthAPI.forgotPassword(document.getElementById('fpEmail').value.trim());
        showAlert(document.getElementById('fpAlert'), 'If that email exists, a reset link has been sent.', 'success');
      } catch (err) {
        showAlert(document.getElementById('fpAlert'), 'Failed to send reset email. Try again.', 'error');
      } finally {
        setLoading(document.getElementById('fpBtn'), false);
      }
    });
  </script>
</body>
</html>
