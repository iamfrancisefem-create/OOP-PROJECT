<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management — ProjectFlow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/forms.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css">
</head>
<body>
  <div class="app-shell">
    <div id="sidebarContainer"></div>
    <div class="main-content">
      <div id="navbarContainer"></div>
      <div class="page-body">
        <div class="section-header">
          <div>
            <h2>User Management</h2>
            <p>Manage user roles and permissions</p>
          </div>
          <div class="flex gap-3">
            <div class="search-bar">
              <i class="fa-solid fa-search"></i>
              <input type="text" id="userSearch" placeholder="Search users...">
            </div>
          </div>
        </div>
        <div class="glass-card">
          <div class="table-wrapper">
            <table class="table" id="userTable">
              <thead>
                <tr>
                  <th>User Name</th>
                  <th>Email</th>
                  <th>Current Role</th>
                  <th>Account Status</th>
                  <th>Date Joined</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="userTableBody">
                <tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div id="userPagination" class="mt-6 flex justify-end"></div>
      </div>
    </div>
  </div>
  <div id="modalContainer"></div>
  <script type="module">
    import { UserAPI } from '../assets/js/api.js';
    import { Theme, Session, authGuard, initSidebar, toast, confirmDialog, renderPagination, ROLES } from '../assets/js/utils.js';

    if (!authGuard()) throw new Error('Not authenticated');
    Theme.init();
    const page = 'user-management';
    let currentPage = 0, totalPages = 0;

    async function loadComponent(url, containerId, cb) {
      try {
        const res = await fetch(url + '?v=' + Date.now());
        document.getElementById(containerId).innerHTML = await res.text();
        if (cb) cb();
      } catch (e) {
        console.error('Failed to load component:', url, e);
      }
    }

    async function loadUsers(p = 0) {
      currentPage = p;
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '<tr><td colspan="6" class="text-muted">Loading...</td></tr>';
      try {
        const res = await UserAPI.getAll(p, 20);
        const data = res.data.data;
        const users = data.content || data || [];
        totalPages = data.totalPages || 1;
        if (!users.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-muted">No users found.</td></tr>';
          return;
        }
        tbody.innerHTML = users.map(u => {
          const currentRole = u.roles?.[0] || 'NONE';
          const roleBadgeClass = currentRole === 'ADMIN' ? 'badge-danger' :
                                 currentRole === 'PROJECT_MANAGER' ? 'badge-primary' :
                                 currentRole === 'TEAM_LEADER' ? 'badge-warning' :
                                 currentRole === 'PRODUCT_OWNER' ? 'badge-info' : 'badge-neutral';
          const statusBadge = u.enabled
            ? `<span class="badge badge-success" style="padding:4px 8px;font-size:11px">Active</span>`
            : `<span class="badge badge-danger" style="padding:4px 8px;font-size:11px">Disabled</span>`;
          const dateJoined = DateHelper.format(u.createdAt);
          
          return `
          <tr>
            <td>
              <div class="user-cell" style="display:flex;align-items:center;gap:10px">
                <div class="mini-avatar" style="width:32px;height:32px;border-radius:50%;background:#6366f1;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">${(u.fullName || u.email || '?')[0].toUpperCase()}</div>
                <span style="font-weight:600;color:var(--text-primary)">${u.fullName || 'N/A'}</span>
              </div>
            </td>
            <td>${u.email}</td>
            <td><span class="role-badge badge ${roleBadgeClass}" style="display:inline-flex;font-size:11px;padding:3px 10px">${currentRole.replace(/_/g, ' ')}</span></td>
            <td>${statusBadge}</td>
            <td>${dateJoined}</td>
            <td>
              <div class="flex items-center gap-2" style="display:inline-flex;align-items:center;gap:8px">
                <select class="form-select role-select" data-user-id="${u.id}" data-current-role="${currentRole}" style="width:auto;min-width:140px;padding:4px 8px;font-size:13px">
                  <option value="NONE" ${currentRole === 'NONE' ? 'selected' : ''}>— No Role —</option>
                  ${Object.values(ROLES).map(r => `<option value="${r}" ${currentRole === r ? 'selected' : ''}>${r.replace(/_/g, ' ')}</option>`).join('')}
                </select>
                ${currentRole !== 'NONE' ? `<button class="btn btn-sm btn-outline btn-remove-role" data-user-id="${u.id}" style="color:var(--danger);padding:6px 10px;font-size:12px"><i class="fa-solid fa-user-minus"></i> Remove</button>` : ''}
              </div>
            </td>
          </tr>
          `;
        }).join('');
        
        document.querySelectorAll('.role-select').forEach(sel => {
          sel.addEventListener('change', () => changeUserRole(sel));
        });
        document.querySelectorAll('.btn-remove-role').forEach(btn => {
          btn.addEventListener('click', () => removeUserRoleHandler(btn.dataset.userId));
        });
        renderPagination('userPagination', currentPage, totalPages, loadUsers);
      } catch (e) {
        console.error('Failed to load users:', e);
        tbody.innerHTML = '<tr><td colspan="6" class="text-muted">Failed to load users. Check console (F12) for details.</td></tr>';
      }
    }

    async function changeUserRole(selectEl) {
      const userId = selectEl.dataset.userId;
      const newRole = selectEl.value;
      const currentRole = selectEl.dataset.currentRole;
      if (newRole === currentRole) return;

      if (newRole === 'NONE') {
        selectEl.value = currentRole; // restore select value first
        removeUserRoleHandler(userId);
        return;
      }

      const ok = await confirmDialog(
        'Change User Role',
        `Are you sure you want to change this user's role to ${newRole.replace(/_/g, ' ')}?`,
        'Change Role'
      );
      if (!ok) {
        selectEl.value = currentRole;
        return;
      }

      try {
        const currentUser = Session.getUser();
        await UserAPI.updateRole(userId, { role: newRole });
        toast('User role updated successfully', 'success');
        loadUsers(currentPage);

        if (currentUser && userId == currentUser.id) {
          const refreshed = await UserAPI.getById(userId);
          const u = refreshed.data.data;
          Session.set(Session.getToken(), Session.getRefresh(), { email: u.email, fullName: u.fullName, phone: u.phone, profileImage: u.profileImage, roles: u.roles, id: u.id });
        }
      } catch (e) {
        selectEl.value = currentRole;
        toast(e.response?.data?.message || 'Failed to update role', 'error');
      }
    }

    async function removeUserRoleHandler(userId) {
      const ok = await confirmDialog(
        'Remove User Role',
        `Are you sure you want to remove this user's role?`,
        'Remove Role'
      );
      if (!ok) return;

      try {
        const currentUser = Session.getUser();
        await UserAPI.removeRole(userId);
        toast('User role removed successfully', 'success');
        loadUsers(currentPage);

        if (currentUser && userId == currentUser.id) {
          const refreshed = await UserAPI.getById(userId);
          const u = refreshed.data.data;
          Session.set(Session.getToken(), Session.getRefresh(), { email: u.email, fullName: u.fullName, phone: u.phone, profileImage: u.profileImage, roles: u.roles, id: u.id });
        }
      } catch (e) {
        toast(e.response?.data?.message || 'Failed to remove role', 'error');
      }
    }

    async function init() {
      try {
        await loadComponent('../components/navbar.html', 'navbarContainer');
      await loadComponent('../components/sidebar.html', 'sidebarContainer', () => initSidebar(page));
        await loadUsers(0);
      } catch (e) {
        console.error('Init error:', e);
      }
      document.getElementById('userSearch').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('#userTableBody tr').forEach(row => {
          const text = row.textContent.toLowerCase();
          row.style.display = text.includes(q) ? '' : 'none';
        });
      });
    }
    init();
  </script>
</body>
</html>
